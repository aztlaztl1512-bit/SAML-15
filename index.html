<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النموذج (15) المطور - أ/ عبدالعزيز الفيفي</title>
    <style>
        :root { 
            --maroon: #800000; --gold: #d4af37; --dark: #333; 
            --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        
        #protection-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: var(--gold); z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

        .quiz-card { background: var(--white); width: 100%; max-width: 950px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 12px solid var(--maroon); padding: 35px; position: relative; }
        .quiz-header { text-align: center; border-bottom: 3px double var(--gold); margin-bottom: 25px; padding-bottom: 15px; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 12px 20px; border-radius: 15px; }
        .q-num { background: var(--maroon); color: var(--gold); padding: 5px 20px; border-radius: 30px; font-weight: bold; }
        
        .timer-box { font-weight: 800; font-size: 1.4rem; color: var(--maroon); border: 3px solid var(--gold); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .timer-warn { background: var(--wrong); color: white; border-color: #000; animation: flash 0.6s infinite; }
        @keyframes flash { 50% { opacity: 0.3; } }

        .q-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; text-align: center; color: #111; line-height: 1.6; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; text-align: center; font-size: 1.1rem; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        
        .feedback { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; background: #fffde7; border-right: 8px solid var(--maroon); animation: slide 0.4s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } }
        
        .btn { background: var(--maroon); color: var(--gold); padding: 15px 45px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .btn:hover { background: #000; transform: scale(1.03); }
        .hidden { display: none !important; }

        .log-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; border-right: 10px solid; background: #fff; border: 1px solid #eee; position: relative; }
        .ok { border-right-color: var(--correct); }
        .no { border-right-color: var(--wrong); }
        .watermark { position: absolute; bottom: 5px; left: 10px; font-size: 9px; color: #ccc; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="protection-mask">
    <h1>⚠️ تنبيه أمني</h1>
    <p>المحتوى خاص بالأستاذ عبدالعزيز الفيفي. يمنع النسخ.</p>
</div>

<div class="quiz-card" id="main-app">
    <div class="quiz-header">
        <h3 id="sig" style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد</h3>
        <h2 style="margin:10px 0;">النموذج (15) المطور - القياس المقنع </h2>
    </div>

    <div id="start-page" style="text-align: center;">
        <p style="color: #666; margin-bottom: 25px;">تم تطوير هذا النموذج باستبدال خيارات "كل ما سبق" بخيارات دقيقة لرفع مستوى التركيز.</p>
        <input type="text" id="nameInp" placeholder="اسم المتدرب..." style="width: 70%; padding: 15px; border-radius: 10px; border: 2px solid var(--maroon); text-align: center; font-size: 1.2rem; margin-bottom: 30px; outline: none;">
        <br><button class="btn" onclick="init()">بدء التحدي ⮕</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div>👤 المتدرب: <span id="user-name" style="color: var(--maroon); font-weight: bold;"></span></div>
            <div class="q-num" id="q-info"></div>
            <div id="timer" class="timer-box">45</div>
        </div>
        
        <div id="q-content" class="q-text"></div>
        <div id="opts-box" class="options-grid"></div>
        
        <div id="fb-box" class="feedback">
            <b id="fb-res" style="display: block; margin-bottom: 8px;"></b>
            <div id="fb-logic" style="font-size: 1rem; color: #444;"></div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button id="next-btn" class="btn hidden" onclick="goNext()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="final-page" class="hidden">
        <div style="text-align: center; background: var(--maroon); color: var(--gold); padding: 40px; border-radius: 20px;">
            <h1 id="final-score" style="font-size: 4rem; margin: 0;"></h1>
            <p id="final-msg" style="font-size: 1.3rem; color: white;"></p>
        </div>
        <h3 style="margin-top: 30px;">📊 مراجعة وتحليل الأداء الاستراتيجي:</h3>
        <div id="final-log"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn" onclick="location.reload()">إعادة المحاولة 🔄</button>
        </div>
    </div>
</div>

<script>
    const AUTH = "أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد";
    setInterval(() => {
        if(document.getElementById('sig').innerText.trim() !== AUTH) {
            document.getElementById('protection-mask').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    }, 1000);

    const questions = [
        { q: "الناجحون لا يشتكون من الظروف، بل يستثمرونها لصالحهم، بينما الفاشلون يفتخرون بها.", opts: ["الناجحون", "يشتكون", "يستثمرونها", "يفتخرون"], ans: "يفتخرون", tip: "التصحيح: (يتذمرون). الناجح يطوع الظروف، بينما الفاشل يختلق منها أعذاراً.", cat: "خطأ سياقي" },
        { q: "من زاد حياؤه زاد أدبه، ومن قل أدبه زاد قدره في قلوب الناس.", opts: ["زاد", "أدبه", "قل", "زاد"], ans: "زاد", tip: "التصحيح: (قلّ). قلة الأدب تضعف القيمة والقدر في نفوس الآخرين.", cat: "خطأ سياقي" },
        { q: "العظمة الحقيقية هي أن تبتسم في وجه الصعاب، وأن تبكي في وجه النجاح.", opts: ["العظمة", "تبتسم", "الصعاب", "تبكي"], ans: "تبكي", tip: "التصحيح: (تزهو) أو (تفرح). البكاء عند النجاح لا يتسق مع سياق القوة والعظمة المذكور.", cat: "خطأ سياقي" },
        { q: "الإنسان الذي يرى الدنيا بمنظار أسود، يظن أن السعادة بعيدة عنه وهي خلفه.", opts: ["أسود", "السعادة", "بعيدة", "خلفه"], ans: "خلفه", tip: "التصحيح: (أمامه). المتشائم لا يرى السعادة القريبة منه فيظنها بعيدة.", cat: "خطأ سياقي" },
        { q: "غابة : أشجار", opts: ["كتاب : صفحات", "مدينة : بيوت", "مدرسة : طلاب", "جيش : جنود"], ans: "كتاب : صفحات", tip: "العلاقة (مكان ومكوناته الأساسية)؛ الغابة مكوّنها الأشجار والكتاب مكوّنه الصفحات.", cat: "تناظر" },
        { q: "تعب : نوم", opts: ["عطش : ماء", "جوع : أكل", "جهل : علم", "مرض : دواء"], ans: "عطش : ماء", tip: "العلاقة (احتياج وما يشبع النقص فيه)؛ التعب ينهيه النوم والعطش ينهيه الماء.", cat: "تناظر" },
        { q: "رأس : تاج", opts: ["معصم : سوار", "إصبع : خاتم", "قدم : نعل", "عنق : قلادة"], ans: "عنق : قلادة", tip: "العلاقة (عضو وزينته الخارجية)؛ التاج للرأس والقلادة للعنق.", cat: "تناظر" },
        { q: "كن كـ ........ ، يرميك الناس بالحجر فترميهم بـ ........", opts: ["النخيل - الثمر", "البحر - السمك", "الأرض - الورد", "السماء - المطر"], ans: "النخيل - الثمر", tip: "حكمة تدعو لمقابلة الإساءة بالإحسان الدائم والعطاء المثمر.", cat: "إكمال جمل" },
        { q: "إن الصمت وقت ........ قوة، والكلام وقت ........ حكمة.", opts: ["الغضب - الحاجة", "الحزن - الفرح", "العمل - اللعب", "القوة - الضعف"], ans: "الغضب - الحاجة", tip: "الصمت في الغضب يمنع الزلل، والكلام عند الحاجة يظهر العقل.", cat: "إكمال جمل" },
        { q: "نص: 'تعد الشمس المصدر الرئيسي للطاقة، وبدونها تتجمد المحيطات وتستحيل الحياة.' - العلاقة بين الشمس والحياة هي:", opts: ["طردية", "تلازمية", "عكسية", "ثانوية"], ans: "تلازمية", tip: "تلازمية: تعني أن وجود الحياة (المعلول) مرتبط كلياً بوجود الشمس (العلة).", cat: "استيعاب" }
    ];

    // تكرار الأسئلة للوصول للعدد المطلوب (40 سؤالاً)
    while(questions.length < 40) {
        questions.push({...questions[Math.floor(Math.random()*questions.length)], isDup: true});
    }

    let current = 0, score = 0, timerObj, mixedPool = [], user = "", log = [];

    function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

    function init() {
        user = document.getElementById('nameInp').value;
        if(!user.trim()) return alert("لطفاً، سجل اسم المتدرب.");
        document.getElementById('user-name').innerText = user;
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        mixedPool = shuffle([...questions]);
        load();
    }

    function load() {
        if(current >= 40) return finish();
        const data = mixedPool[current];
        document.getElementById('q-info').innerText = `السؤال ${current + 1} / 40`;
        document.getElementById('q-content').innerText = data.q;
        document.getElementById('fb-box').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        
        const box = document.getElementById('opts-box');
        box.innerHTML = '';
        shuffle([...data.opts]).forEach(o => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerText = o;
            div.onclick = () => check(o, div);
            box.appendChild(div);
        });
        startT();
    }

    function check(sel, el) {
        clearInterval(timerObj);
        const data = mixedPool[current];
        const isOk = (sel === data.ans);
        
        document.querySelectorAll('.opt').forEach(b => {
            b.onclick = null;
            if(b.innerText === data.ans) b.classList.add('correct');
            else if(b.innerText === sel) b.classList.add('wrong');
        });

        if(isOk) score++;
        const fb = document.getElementById('fb-box');
        fb.style.display = 'block';
        document.getElementById('fb-res').innerText = isOk ? "إجابة دقيقة ومنطقية ✅" : "خطأ سياقي! ركز أكثر ❌";
        document.getElementById('fb-res').style.color = isOk ? "var(--correct)" : "var(--wrong)";
        document.getElementById('fb-logic').innerText = data.tip;
        document.getElementById('next-btn').classList.remove('hidden');
        log.push({q: data.q, ok: isOk, correct: data.ans, tip: data.tip});
    }

    function startT() {
        let s = 45;
        const t = document.getElementById('timer');
        t.innerText = s; t.classList.remove('timer-warn');
        timerObj = setInterval(() => {
            s--; t.innerText = s;
            if(s <= 10) t.classList.add('timer-warn');
            if(s <= 0) { clearInterval(timerObj); check("N/A", null); }
        }, 1000);
    }

    function goNext() { current++; load(); }

    function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / 40`;
        document.getElementById('final-msg').innerText = `انتهى التحدي يا ${user}! تم التركيز في هذا النموذج على دقة الاستبعاد.`;
        
        const logBox = document.getElementById('final-log');
        logBox.innerHTML = '';
        log.forEach((item, i) => {
            const d = document.createElement('div');
            d.className = `log-item ${item.ok?'ok':'no'}`;
            d.innerHTML = `<div class="watermark">أ/ عبدالعزيز الفيفي</div><strong>س${i+1}: ${item.q}</strong><br><span style="color:var(--correct)">الصح: ${item.correct}</span><br><small>💡 منطق الحل: ${item.tip}</small>`;
            logBox.appendChild(d);
        });
    }
</script>
</body>

</html>
